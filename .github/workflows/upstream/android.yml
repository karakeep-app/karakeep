name: Android App Release Build
# Disabled in this fork. The upstream workflow publishes a karakeep-branded build.
# Trigger manually via workflow_dispatch if you intend to produce your own build.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup
        uses: ./tooling/github/setup

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android app
        working-directory: apps/mobile
        run: eas build --platform android --local --output ${{ github.workspace }}/app-release.aab
        env:
          EAS_SKIP_AUTO_FINGERPRINT: "1"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: karakeep-android
          path: ${{ github.workspace }}/app-release.aab
